<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMAIR AI MODEL - Premium Image Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050510;
            --glass-bg: rgba(20, 20, 35, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #00f3ff;
            --neon-purple: #9d00ff;
            --text-main: #ffffff;
            --text-muted: #a0a0b5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(157, 0, 255, 0.08), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Typography & Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 5, 16, 0.7);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Buttons & Inputs */
        button {
            cursor: pointer;
            border: none;
            outline: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            color: white;
            padding: 12px 24px;
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 10px 20px;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s ease;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        /* Workspace Area */
        .generator-workspace {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        /* Image Display & Loading */
        .image-display {
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--glass-border);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
        }

        .image-display img {
            max-width: 100%;
            max-height: 600px;
            border-radius: 8px;
            display: none;
            z-index: 2;
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Premium Loading Animation */
        .loader {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 3;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-top-color: var(--neon-cyan);
            border-bottom-color: var(--neon-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .typing-effect {
            color: var(--neon-cyan);
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        /* Gallery */
        .gallery-header {
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1/1;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .gallery-card:hover {
            transform: scale(1.02);
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.3);
        }

        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Settings Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            width: 100%;
            max-width: 450px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Actions */
        .action-bar {
            display: none;
            justify-content: center;
            margin-top: 15px;
            gap: 15px;
        }

        /* Animations */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Responsive */
        @media (max-width: 768px) {
            .input-group { flex-direction: column; }
            header { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">UMAIR AI MODEL</div>
        <button class="btn-secondary" onclick="toggleSettings()">⚙️ Settings</button>
    </header>

    <main>
        <section class="generator-workspace glass-panel">
            <div class="input-group">
                <input type="text" id="promptInput" placeholder="Describe the image you want to generate... (e.g., A cyberpunk city at night with neon lights)">
                <button class="btn-primary" onclick="generateImage()">Generate</button>
            </div>

            <div class="image-display" id="imageDisplayBox">
                <div class="placeholder-text" id="placeholderText">Your masterpiece will appear here</div>
                
                <div class="loader" id="loader">
                    <div class="spinner"></div>
                    <div class="typing-effect">UMAIR AI is dreaming...</div>
                </div>

                <img id="resultImage" alt="Generated AI Image">
            </div>

            <div class="action-bar" id="actionBar">
                <button class="btn-primary" onclick="downloadImage()">⬇️ Download HD</button>
            </div>
        </section>

        <section class="gallery-section">
            <h2 class="gallery-header">Your Gallery</h2>
            <div class="gallery-grid" id="galleryGrid">
                </div>
        </section>
    </main>

    <div class="modal-overlay" id="settingsModal">
        <div class="glass-panel modal-content">
            <div class="modal-header">
                <h2>API Settings</h2>
                <button class="close-btn" onclick="toggleSettings()">&times;</button>
            </div>
            <p style="color: var(--text-muted); margin-bottom: 15px; font-size: 0.9rem;">Enter your OpenRouter API Key to unlock UMAIR AI MODEL's full potential. Keys are stored locally.</p>
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." style="margin-bottom: 20px;">
            <button class="btn-primary" style="width: 100%;" onclick="saveApiKey()">Save Configuration</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const promptInput = document.getElementById('promptInput');
        const resultImage = document.getElementById('resultImage');
        const loader = document.getElementById('loader');
        const placeholderText = document.getElementById('placeholderText');
        const actionBar = document.getElementById('actionBar');
        const galleryGrid = document.getElementById('galleryGrid');
        const settingsModal = document.getElementById('settingsModal');
        const apiKeyInput = document.getElementById('apiKeyInput');

        let currentImageUrl = '';
        let imageHistory = JSON.parse(localStorage.getItem('umair_img_history')) || [];

        // Initialize App
        window.onload = () => {
            const savedKey = localStorage.getItem('umair_api_key');
            if (savedKey) apiKeyInput.value = savedKey;
            renderGallery();
        };

        // Settings Management
        function toggleSettings() {
            settingsModal.classList.toggle('active');
        }

        function saveApiKey() {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('umair_api_key', key);
                alert('UMAIR AI MODEL API Key saved securely!');
                toggleSettings();
            } else {
                alert('Please enter a valid API key.');
            }
        }

        // Image Generation Logic
        async function generateImage() {
            const prompt = promptInput.value.trim();
            const apiKey = localStorage.getItem('umair_api_key');

            if (!prompt) return alert('Please enter a prompt first.');
            if (!apiKey) {
                alert('API Key missing. Please add your OpenRouter API Key in Settings.');
                toggleSettings();
                return;
            }

            // UI State: Loading
            placeholderText.style.display = 'none';
            resultImage.style.display = 'none';
            actionBar.style.display = 'none';
            loader.style.display = 'flex';

            try {
                /* * NOTE ON OPENROUTER API FOR IMAGES:
                 * OpenRouter is an aggregator. To generate images, you need to target a model that 
                 * supports image generation (e.g., specific models if/when provided by OpenRouter) 
                 * or use an OpenAI-compatible endpoint structure if using a text-to-image proxy.
                 * This fetch assumes a standard OpenAI-style image generation payload routed 
                 * through OpenRouter, or a placeholder if OpenRouter integrates DALL-E/SD directly.
                 */
                
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'HTTP-Referer': window.location.href, 
                        'X-Title': 'UMAIR AI MODEL',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        // Using a dummy model here. Replace with the actual image model string
                        // supported by OpenRouter (e.g., an available SDXL or DALL-E proxy string)
                        model: "mistralai/mixtral-8x7b-instruct", 
                        messages: [
                            { 
                                role: "user", 
                                content: `Generate an image link for: ${prompt}. Only return the direct URL of the image, nothing else.` 
                            }
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message || 'API Error');
                }

                // Fallback Mock URL if a true image generation endpoint isn't used
                // Since text-models won't actually render an image URL natively without a plugin,
                // you would normally hit `https://api.openai.com/v1/images/generations` directly 
                // if using standard DALL-E. For this demo to visually work smoothly:
                
                const generatedText = data.choices[0].message.content;
                let imageUrl = generatedText.startsWith('http') ? generatedText : `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

                // UI State: Success
                currentImageUrl = imageUrl;
                resultImage.src = imageUrl;
                
                resultImage.onload = () => {
                    loader.style.display = 'none';
                    resultImage.style.display = 'block';
                    actionBar.style.display = 'flex';
                    addToHistory(imageUrl);
                };

            } catch (error) {
                console.error(error);
                loader.style.display = 'none';
                placeholderText.style.display = 'block';
                placeholderText.innerText = '⚠️ Generation failed. Check API Key or try again.';
                placeholderText.style.color = '#ff4444';
            }
        }

        // Download functionality
        async function downloadImage() {
            if (!currentImageUrl) return;
            try {
                const response = await fetch(currentImageUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `UMAIR_AI_${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (err) {
                // Fallback for CORS issues
                window.open(currentImageUrl, '_blank');
            }
        }

        // History Gallery Management
        function addToHistory(url) {
            if (!imageHistory.includes(url)) {
                imageHistory.unshift(url);
                if (imageHistory.length > 12) imageHistory.pop(); // Keep last 12
                localStorage.setItem('umair_img_history', JSON.stringify(imageHistory));
                renderGallery();
            }
        }

        function renderGallery() {
            galleryGrid.innerHTML = '';
            imageHistory.forEach(url => {
                const card = document.createElement('div');
                card.className = 'gallery-card glass-panel';
                card.style.padding = '5px';
                card.innerHTML = `<img src="${url}" alt="History Image" loading="lazy">`;
                card.onclick = () => {
                    currentImageUrl = url;
                    resultImage.src = url;
                    placeholderText.style.display = 'none';
                    resultImage.style.display = 'block';
                    actionBar.style.display = 'flex';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                galleryGrid.appendChild(card);
            });
        }
    </script>
</body>
  </html>
